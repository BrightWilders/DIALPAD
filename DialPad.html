<!DOCTYPE html>
<head>
  <meta charset="UTF-8">
  <title>Dialpad Vendor Split</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f7fa;
      padding: 30px;
      margin: 0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 10px;
    }

    label {
      display: inline-block;
      margin-top: 10px;
    }

    input[type="number"] {
      padding: 6px;
      font-size: 14px;
      width: 120px;
      margin-right: 10px;
    }

    button {
      padding: 8px 16px;
      background-color: #007acc;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-right: 8px;
      margin-top: 10px;
    }

    button:hover {
      background-color: #005b99;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 13px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 6px 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background-color: #eef3f7;
    }

    tfoot {
      font-weight: bold;
    }

    summary {
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
      font-size: 15px;
    }

    details {
      margin-top: 20px;
    }

    .memo-box {
      margin-top: 20px;
      padding: 14px;
      background: #f7fbff;
      border: 1px solid #cfe6f7;
      border-radius: 8px;
    }

    .memo-text {
      margin-top: 8px;
      font-family: monospace;
      background: white;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
      display: inline-block;
      min-width: 320px;
    }

    .copied-msg {
      margin-left: 10px;
      color: green;
      font-size: 13px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Dialpad Vendor Split</h2>

    <label>Total Invoice Amount:</label>
    <input type="number" id="dialpad-total" value="0" step="0.01">
    <button onclick="calculateDialpad()">Calculate Allocation</button>

    <div id="dialpad-result"></div>
  </div>

  <script>
    function formatNumber(num) {
      return num.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function getCurrentMonthYear() {
      const today = new Date();
      return today.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    }

    function copyMemo() {
      const memoText = document.getElementById("breezeway-memo").innerText;
      navigator.clipboard.writeText(memoText).then(() => {
        const copiedMsg = document.getElementById("copied-msg");
        copiedMsg.style.display = "inline";
        setTimeout(() => {
          copiedMsg.style.display = "none";
        }, 2000);
      });
    }

    function calculateDialpad() {
      const total = parseFloat(document.getElementById("dialpad-total").value) || 0;
      const monthYear = getCurrentMonthYear();
      const breezewayMemo = `Dialpad Monthly Phone Charge - ${monthYear} (7210-100) *(BKW BLDG 7)`;

      const data = [
        { user: "Accounting", pct: 1.62, coding: "7210", dept: "Corp Ops - Finance & Accounting", class: "Unassigned Listing" },
        { user: "Gems", pct: 58.52, coding: "7210", dept: "Guest Services - GEMs", class: "Unassigned Listing" },
        { user: "HR", pct: 3.25, coding: "7210", dept: "Corp Ops - Legal & Risk", class: "Unassigned Listing" },
        { user: "OPS", pct: 17.79, coding: "7210", dept: "Office & Admin", class: "Unassigned Listing" },
        { user: "OSM", pct: 3.25, coding: "7210", dept: "Owner Success", class: "Unassigned Listing" },
        { user: "Risk", pct: 1.63, coding: "7210", dept: "Corp Ops - Legal & Risk", class: "Unassigned Listing" },
        { user: "Sales", pct: 1.63, coding: "7210", dept: "Sales & Marketing", class: "Unassigned Listing" },

        { user: "SH5", pct: 6.155, coding: "5039", dept: "Maintenance - BKW Bldg 7", class: "BKW ALL" },
        { user: "SH5", pct: 6.155, coding: "7210", dept: "Market Ops - Core Operations", class: "BKW Bldg 7", memo: breezewayMemo }
      ];

      const detailRows = [];
      const pivot = {};
      let grandTotal = 0;

      data.forEach(item => {
        const amount = (total * item.pct / 100);
        grandTotal += amount;
        const key = `${item.coding}||${item.dept}||${item.class}`;

        if (!pivot[key]) {
          pivot[key] = 0;
        }
        pivot[key] += amount;

        detailRows.push(`<tr>
          <td>${item.user}</td>
          <td>${item.pct.toFixed(3)}%</td>
          <td>$${formatNumber(amount)}</td>
          <td>${item.coding}</td>
          <td>${item.dept}</td>
          <td>
            ${item.class}
            ${item.memo ? `<br><strong>Memo:</strong> ${item.memo}` : ""}
          </td>
        </tr>`);
      });

      const pivotRows = Object.entries(pivot).map(([key, value]) => {
        const [coding, dept, className] = key.split("||");
        return `<tr>
          <td>${coding}</td>
          <td>${dept}</td>
          <td>${className}</td>
          <td style="text-align:right;">$${formatNumber(value)}</td>
        </tr>`;
      }).join("");

      const output = `
        <div class="memo-box">
          <strong>Breezeway Memo for SH5 7210</strong>
          <div id="breezeway-memo" class="memo-text">${breezewayMemo}</div><br>
          <button onclick="copyMemo()">Copy Memo</button>
          <span id="copied-msg" class="copied-msg">Copied!</span>
        </div>

        <details open>
          <summary>Summary by Coding / Dept / Class</summary>
          <table>
            <thead>
              <tr>
                <th>Coding</th>
                <th>Department</th>
                <th>Class</th>
                <th style="text-align:right;">Sum of Amount</th>
              </tr>
            </thead>
            <tbody>${pivotRows}</tbody>
            <tfoot>
              <tr>
                <td colspan="3">Grand Total</td>
                <td style="text-align:right;">$${formatNumber(grandTotal)}</td>
              </tr>
            </tfoot>
          </table>
        </details>

        <details>
          <summary>Show Detailed Allocation</summary>
          <table>
            <thead>
              <tr>
                <th>User</th>
                <th>Percentage</th>
                <th>Amount</th>
                <th>Coding</th>
                <th>Department</th>
                <th>Class / Memo</th>
              </tr>
            </thead>
            <tbody>${detailRows.join("")}</tbody>
          </table>
        </details>`;

      document.getElementById("dialpad-result").innerHTML = output;
    }
  </script>
</body>
</html>
